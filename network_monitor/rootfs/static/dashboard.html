<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { color: #333; margin-bottom: 10px; }
        .header-buttons { display: flex; gap: 10px; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { background: #764ba2; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-card .label { color: #888; font-size: 14px; margin-top: 5px; }

        .devices-table {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: #f5f5f5;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #ddd;
        }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f9f9f9; }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-online { background: #d4edda; color: #155724; }
        .badge-offline { background: #f8d7da; color: #721c24; }

        .ip { font-family: monospace; color: #667eea; }
        .mac { font-family: monospace; font-size: 12px; color: #888; }

        .loading { text-align: center; color: white; }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Network Monitor</h1>
            <div class="header-buttons">
                <button onclick="scan()">🔄 Scan Now</button>
                <button onclick="loadApiKey()">🔑 Set API Key</button>
            </div>
        </header>

        <div id="message" style="display: none;"></div>

        <div class="grid">
            <div class="stat-card">
                <div class="number" id="total">-</div>
                <div class="label">Total Devices</div>
            </div>
            <div class="stat-card">
                <div class="number" id="online" style="color: #28a745;">-</div>
                <div class="label">Online</div>
            </div>
            <div class="stat-card">
                <div class="number" id="offline" style="color: #dc3545;">-</div>
                <div class="label">Offline</div>
            </div>
        </div>

        <div class="devices-table">
            <table>
                <thead>
                    <tr>
                        <th>Device</th>
                        <th>IP Address</th>
                        <th>MAC Address</th>
                        <th>Manufacturer</th>
                        <th>Last Seen</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="devices-tbody">
                    <tr><td colspan="6" class="loading">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_KEY_KEY = 'nm_api_key';

        function getApiKey() {
            return localStorage.getItem(API_KEY_KEY);
        }

        function loadApiKey() {
            const key = prompt('Enter API Key:', getApiKey() || '');
            if (key) {
                localStorage.setItem(API_KEY_KEY, key);
                loadDevices();
            }
        }

        function showMessage(msg, type = 'error') {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className = type;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        async function apiCall(endpoint, method = 'GET', body = null) {
            const key = getApiKey();
            if (!key) {
                loadApiKey();
                return null;
            }

            try {
                const opts = {
                    method,
                    headers: { 'X-API-Key': key }
                };
                if (body) opts.body = JSON.stringify(body);

                const res = await fetch(endpoint, opts);
                if (res.status === 401) {
                    loadApiKey();
                    return null;
                }
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return await res.json();
            } catch (err) {
                showMessage(`Error: ${err.message}`, 'error');
                return null;
            }
        }

        async function loadDevices() {
            const data = await apiCall('/api/devices');
            if (!data) return;

            const stats = await apiCall('/api/stats');
            if (stats) {
                document.getElementById('total').textContent = stats.total;
                document.getElementById('online').textContent = stats.online;
                document.getElementById('offline').textContent = stats.offline;
            }

            const tbody = document.getElementById('devices-tbody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #888;">No devices found. Run a scan.</td></tr>';
                return;
            }

            data.forEach(dev => {
                const lastSeen = new Date(dev.last_seen).toLocaleString();
                const status = dev.online ? '<span class="badge badge-online">Online</span>' : '<span class="badge badge-offline">Offline</span>';

                tbody.innerHTML += `
                    <tr>
                        <td>${dev.hostname || 'Unknown'}</td>
                        <td><span class="ip">${dev.ip || '-'}</span></td>
                        <td><span class="mac">${dev.mac}</span></td>
                        <td>${dev.manufacturer || '-'}</td>
                        <td>${lastSeen}</td>
                        <td>${status}</td>
                    </tr>
                `;
            });
        }

        async function scan() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '⏳ Scanning...';

            const result = await apiCall('/api/scan', 'POST', {});
            if (result) {
                showMessage('Scan completed! 🎉', 'success');
                await new Promise(r => setTimeout(r, 1000));
                await loadDevices();
            }

            btn.disabled = false;
            btn.textContent = '🔄 Scan Now';
        }

        // Load on startup
        loadDevices();
        setInterval(loadDevices, 30000); // Refresh every 30s
    </script>
</body>
</html>
