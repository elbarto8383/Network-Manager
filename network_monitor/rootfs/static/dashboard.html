<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Network Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1a202c;
      --muted: #718096;
      --blue: #3b82f6;
      --green: #10b981;
      --red: #ef4444;
      --amber: #f59e0b;
      --radius: 10px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }

    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    h1 { font-size: 20px; font-weight: 700; color: var(--text); }
    .header-right { display: flex; gap: 8px; align-items: center; }

    button {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--card); color: var(--text); cursor: pointer;
      font-size: 13px; font-weight: 500; transition: background .15s;
    }
    button:hover { background: #f7fafc; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
    .btn-primary:hover { background: #2563eb; }

    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .stat .num { font-size: 28px; font-weight: 700; }
    .stat .lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .stat.online .num { color: var(--green); }
    .stat.offline .num { color: var(--red); }
    .stat.changes .num { color: var(--amber); }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .card-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-header h2 { font-size: 14px; font-weight: 600; }

    .filter-bar { padding: 10px 18px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; }
    input[type=text] {
      flex: 1; min-width: 160px; padding: 7px 12px; border: 1px solid var(--border);
      border-radius: 6px; font-size: 13px; background: var(--bg); color: var(--text);
    }
    select {
      padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px;
      font-size: 13px; background: var(--bg); color: var(--text);
    }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 10px 14px; text-align: left; font-weight: 600; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); background: #fafafa; }
    td { padding: 11px 14px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafcff; }

    .badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-online { background: #d1fae5; color: #065f46; }
    .badge-offline { background: #fee2e2; color: #7f1d1d; }

    .mono { font-family: 'SF Mono', 'Fira Code', monospace; color: var(--blue); }
    .mac { font-family: monospace; font-size: 11px; color: var(--muted); }
    .manufacturer { font-size: 12px; color: var(--muted); }

    .name-cell { display: flex; align-items: center; gap: 6px; }
    .edit-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 14px; padding: 2px 4px; border-radius: 4px; }
    .edit-btn:hover { background: var(--bg); color: var(--blue); }

    .inline-edit { display: flex; align-items: center; gap:4px; }
    .inline-edit input { padding: 4px 8px; border: 1px solid var(--blue); border-radius: 5px; font-size: 13px; width: 140px; }
    .inline-edit button { padding: 4px 8px; font-size: 12px; }

    .empty { text-align: center; color: var(--muted); padding: 40px; }

    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    .dot-online { background: var(--green); }
    .dot-offline { background: var(--red); }

    .toast { position: fixed; bottom: 20px; right: 20px; background: #1a202c; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; }

    .setup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .setup-box { background: var(--card); border-radius: 14px; padding: 28px; width: 340px; max-width: 95vw; }
    .setup-box h2 { font-size: 16px; margin-bottom: 8px; }
    .setup-box p { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
    .setup-box input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; margin-bottom: 12px; font-family: monospace; }
    .setup-box .actions { display: flex; gap: 8px; justify-content: flex-end; }
  </style>
</head>
<body>

<div id="setup-overlay" class="setup-overlay" style="display:none;">
  <div class="setup-box">
    <h2>🔑 Inserisci API Key</h2>
    <p>Imposta la stessa API Key configurata nelle opzioni dell'addon.</p>
    <input type="password" id="setup-key" placeholder="La tua API Key..." autocomplete="off">
    <div class="actions">
      <button class="btn-primary" onclick="saveKey()">Salva e continua</button>
    </div>
  </div>
</div>

<header>
  <h1>🌐 Network Monitor</h1>
  <div class="header-right">
    <span id="last-scan" style="font-size:12px; color:var(--muted);"></span>
    <button onclick="triggerScan(this)">🔄 Scan manuale</button>
    <button onclick="showSetup()">🔑 API Key</button>
  </div>
</header>

<div class="stats">
  <div class="stat"><div class="num" id="s-total">—</div><div class="lbl">Device totali</div></div>
  <div class="stat online"><div class="num" id="s-online">—</div><div class="lbl">Online</div></div>
  <div class="stat offline"><div class="num" id="s-offline">—</div><div class="lbl">Offline</div></div>
  <div class="stat changes"><div class="num" id="s-changes">—</div><div class="lbl">Cambi IP (24h)</div></div>
</div>

<div class="card">
  <div class="card-header">
    <h2>Device rilevati</h2>
    <span id="refresh-time" style="font-size:11px; color:var(--muted);"></span>
  </div>
  <div class="filter-bar">
    <input type="text" id="search" placeholder="Cerca per nome, IP, MAC..." oninput="renderTable()">
    <select id="filter-status" onchange="renderTable()">
      <option value="all">Tutti</option>
      <option value="online">Solo online</option>
      <option value="offline">Solo offline</option>
    </select>
  </div>
  <div style="overflow-x:auto;">
    <table>
      <thead>
        <tr>
          <th>Stato</th>
          <th>Nome</th>
          <th>IP</th>
          <th>MAC</th>
          <th>Produttore</th>
          <th>Ultimo visto</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  const KEY_STORE = 'nm_api_key_v2';
  let allDevices = [];
  let editingMac = null;

  function getKey() { return sessionStorage.getItem(KEY_STORE) || ''; }
  function saveKey() {
    const k = document.getElementById('setup-key').value.trim();
    if (!k) return;
    sessionStorage.setItem(KEY_STORE, k);
    document.getElementById('setup-overlay').style.display = 'none';
    load();
  }
  function showSetup() {
    document.getElementById('setup-key').value = getKey();
    document.getElementById('setup-overlay').style.display = 'flex';
  }

  function toast(msg, ok=true) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.background = ok ? '#065f46' : '#7f1d1d';
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  async function api(path, method='GET', body=null) {
    const key = getKey();
    if (!key) { showSetup(); return null; }
    try {
      const r = await fetch(path, {
        method,
        headers: { 'X-API-Key': key, 'Content-Type': 'application/json' },
        body: body ? JSON.stringify(body) : undefined
      });
      if (r.status === 401) { showSetup(); return null; }
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return await r.json();
    } catch(e) {
      toast('Errore: ' + e.message, false);
      return null;
    }
  }

  async function load() {
    const [devices, stats] = await Promise.all([
      api('/api/devices'),
      api('/api/stats')
    ]);
    if (!devices || !stats) return;

    allDevices = devices;
    document.getElementById('s-total').textContent = stats.total;
    document.getElementById('s-online').textContent = stats.online;
    document.getElementById('s-offline').textContent = stats.offline;
    document.getElementById('s-changes').textContent = stats.ip_changes_24h;
    document.getElementById('refresh-time').textContent = 'Aggiornato: ' + new Date().toLocaleTimeString('it-IT');
    renderTable();
  }

  function renderTable() {
    const q = document.getElementById('search').value.toLowerCase();
    const fs = document.getElementById('filter-status').value;
    const tbody = document.getElementById('tbody');

    let rows = allDevices.filter(d => {
      if (fs === 'online' && !d.online) return false;
      if (fs === 'offline' && d.online) return false;
      if (q) {
        const hay = [d.display_name, d.ip_address, d.mac_address, d.manufacturer].join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });

    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">Nessun device trovato.</td></tr>';
      return;
    }

    tbody.innerHTML = rows.map(d => {
      const dot = d.online
        ? '<span class="dot dot-online"></span>'
        : '<span class="dot dot-offline"></span>';
      const badge = d.online
        ? '<span class="badge badge-online">Online</span>'
        : '<span class="badge badge-offline">Offline</span>';

      const lastSeen = d.last_seen
        ? new Date(d.last_seen + 'Z').toLocaleString('it-IT')
        : '—';

      const nameCell = editingMac === d.mac_address
        ? `<td>
            <div class="inline-edit">
              <input type="text" id="rename-input" value="${escHtml(d.display_name)}" onkeydown="if(event.key==='Enter') confirmRename('${d.mac_address}'); if(event.key==='Escape') cancelRename();">
              <button onclick="confirmRename('${d.mac_address}')">✓</button>
              <button onclick="cancelRename()">✕</button>
            </div>
          </td>`
        : `<td>
            <div class="name-cell">
              ${escHtml(d.display_name)}
              <button class="edit-btn" title="Rinomina" onclick="startRename('${d.mac_address}')">✏️</button>
            </div>
          </td>`;

      return `<tr>
        <td>${badge}</td>
        ${nameCell}
        <td><span class="mono">${d.ip_address || '—'}</span></td>
        <td><span class="mac">${d.mac_address}</span></td>
        <td><span class="manufacturer">${d.manufacturer || '—'}</span></td>
        <td style="font-size:12px; color:var(--muted);">${lastSeen}</td>
      </tr>`;
    }).join('');

    if (editingMac) {
      const inp = document.getElementById('rename-input');
      if (inp) { inp.focus(); inp.select(); }
    }
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function startRename(mac) { editingMac = mac; renderTable(); }
  function cancelRename() { editingMac = null; renderTable(); }

  async function confirmRename(mac) {
    const inp = document.getElementById('rename-input');
    if (!inp) return;
    const name = inp.value.trim();
    if (!name) return;
    const r = await api('/api/device/' + encodeURIComponent(mac), 'PATCH', { custom_name: name });
    if (r && r.ok) {
      const d = allDevices.find(x => x.mac_address === mac);
      if (d) { d.display_name = name; d.custom_name = name; }
      toast('Nome aggiornato: ' + name);
    }
    editingMac = null;
    renderTable();
  }

  async function triggerScan(btn) {
    btn.disabled = true;
    btn.textContent = '⏳ Scansione...';
    const r = await api('/api/scan', 'POST', {});
    if (r) { toast('Scansione completata!'); await load(); }
    btn.disabled = false;
    btn.textContent = '🔄 Scan manuale';
  }

  // Init
  if (!getKey()) {
    showSetup();
  } else {
    load();
  }
  setInterval(load, 60000);
</script>
</body>
</html>
